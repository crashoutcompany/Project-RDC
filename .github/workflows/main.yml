# Fork PRs do not receive repository secrets. Lint/test use inline DB URL fallbacks for prisma generate.
# Build runs only for push to main and same-repo PRs (Vercel + secrets). Fork PRs: lint + test only;
# use Vercel preview deployments for full compile/deploy signal on external contributions.
name: Actions CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci?schema=public' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci?schema=public' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm install

      - name: Pull Vercel Environment Variables
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --token ${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: vercel build --token ${{ secrets.VERCEL_TOKEN }} --prod

  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci?schema=public' }}
      DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci?schema=public' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.0"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test
        continue-on-error: false
